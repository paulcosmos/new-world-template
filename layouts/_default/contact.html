			{{ define "main" }}
			<section class="section contact">
				<div class="container is-fullhd">
					<div id="map" class="map has-background-grey is-hidden-touch"></div>
					<div class="columns is-variableis-multiline">

						<div class="column is-4-desktop">
							<div class="content contact-details mb-6" data-aos="fade-right">
								<h2>Business Address</h2>
								<address>
								{{- with .Site.Params }}
									{{ .building }}, <br/>
									{{ .street }},<br/>
									{{ .towncity }},<br/>
									{{ .postcode }}
								{{- end }}
								</address>
							</div>
							{{  partial "contact-details.html" .  }}
						</div>

						<div class="column is-offset-2-desktop box contact-form" data-aos="fade-up">         
										{{ partial "contact-form.html" . }}
						</div>
					</div>
				</div>
			</section>
			{{ end }}

		{{- define "scripts" -}}
		<script async defer src="js/map.js"></script>
		{{ end }}
