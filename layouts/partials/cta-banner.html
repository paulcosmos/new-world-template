<section class="section">
   <div class="container is-fullhd">
      <div class="cta-banner" data-aos="fade-up">
         <div class="columns is-vcentered is-multiline">
            <div class="column is-12-tablet is-8-desktop is-8-fullhd">
               <div class="content _has-text-centered-touch _has-text-left-desktop">
                  <p>Call us today on <a href='tel:{{- replaceRE "(\\s)" "" .Site.Params.phone |  -}}'>{{ .Site.Params.phone }}</a> (Jack) or <a href='tel:{{- replaceRE "(\\s)" "" .Site.Params.mobile |  -}}'>{{ .Site.Params.mobile }}</a> (Paul), or use our contact form to request a callback.</p>
               </div>
            </div>
            <div class="column is-12-tablet is-offset-1-desktop is-3-desktop _is-offset-1-fullhd">
               <div data-aos="fade-right" data-aos-anchor-placement="bottom-bottom">
                  <button class="button button-primary ml-0 modal-trigger" data-target="quote-modal"  href="#">{{ .Site.Params.modalbuttontext }} <i class="fa-solid fa-arrow-right"></i></button>
               </div>
            </div>
         </div>
      </div>
   </div>
</section>
