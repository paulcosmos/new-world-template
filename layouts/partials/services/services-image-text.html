

					<div id="{{ anchorize .Title }}" class="columns company-services-item is-vcentered is-multiline is-variable is-8">
						<div class="column is-12-touch is-7-desktop is-6-fullhd">
							{{/*  <div class="pre-heading" data-aos="fade-down">Buy Drain Tags</div>  */}}
							<div class="content has-accent" data-aos="fade-right">
									<h3>{{ .Params.title }}</h3>
									<p>{{ .Params.desc }}</p>
								<hr>
								<div class="has-text-centered">
										<p class=price-span>from <span>£3.75</span> per tag</p>
										<a href="{{ .RelPermalink }}" class="button _is-primary">Buy now <span class="icon ml-1"><i class="fa-regular fa-sm fa-arrow-right"></i></span></a> 
									</div>

							</div>
						</div>
						<div class="column" data-aos="fade-left">
							<div class="image is-1by1 company-services-image company-services-image">
								{{- $image := resources.Get .Params.image }}
								{{- if $image }}
								<img src='{{ ($image.Fill "1200x1200 q50 Center").RelPermalink }}' alt="" title=""/>
								{{ else }}
								<img src='/images/placeholder.jpg'/>
								{{- end }}
							</div>
						</div>
					</div>
